services:
  postgres:
    image: postgres:17.8-alpine
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  elasticsearch:
    image: elasticsearch:8.19.11
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: "no"
    env_file:
      - ./backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    command: ["migrate"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
      backend-migrate:
        condition: service_completed_successfully
    command: ["property-service"]

  listing-indexer:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      backend-migrate:
        condition: service_completed_successfully
    command: ["listing-indexer"]

volumes:
  postgres_data:
  redis_data:
  elastic_data:
